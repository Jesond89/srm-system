# ── Railway — Deploy del backend SRM ─────────────────────────────────────────
# Documentación: https://docs.railway.app/reference/config-as-code

[build]
builder          = "DOCKERFILE"
dockerfilePath   = "backend/Dockerfile"
buildCommand     = ""

[deploy]
startCommand          = "node src/app.js"
healthcheckPath       = "/api/health"
healthcheckTimeout    = 300
restartPolicyType     = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Variables de entorno → se configuran en el dashboard de Railway:
# PORT, NODE_ENV, JWT_SECRET, JWT_EXPIRES_IN,
# SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_KEY,
# GEMINI_API_KEY, SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS,
# FRONTEND_URL (URL de Vercel una vez desplegado)
